
server:
    port: 8888
    servlet:
        context-path: /api/fantastic
spring:
    application:
        name: fantastic

    datasource:
        url: jdbc:mysql://localhost:3306/fan?useUnicode=true&characterEncoding=utf8&useSSL=false&serverTimezone=Asia/Shanghai&allowPublicKeyRetrieval=true
        username: root
        password: root
        driver-class-name: com.mysql.cj.jdbc.Driver
        type: com.zaxxer.hikari.HikariDataSource

dongya58:
  monitor:
    schedule:
      cron: "0 0 */2 * * *"
    time-filter:
      days:
        - day: "周一"
          time: "09:00"
        - day: "周二"
          time: "10:00"
        - day: "周三"
          time: "09:00"
        - day: "周四"
          time: "10:00"
        - day: "周五"
          time: "09:00"
        - day: "周六"
          time: "08:00"
        - day: "周日"
          time: "08:00"
    place-filter:
      places:
#        - "黄龙体育中心"
#        - "城西网球中心"
#        - "江干网球中心"
    new-match:
      time-window-hours: 96
    notice:
      enabled: true
      title-prefix: "[动呀网球]"
        